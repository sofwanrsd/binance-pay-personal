<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Binance Pay Gateway</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0a0c14;--card:#151a26;--card2:#0f131d;--border:#222838;--border2:#2d3548;--gold:#8b7cff;--gold2:#22d3ee;--gold-dim:#6d5ee0;--txt:#eceef4;--muted:#828aa0;--muted2:#5a6178}
    html{scroll-behavior:smooth}
    body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;-webkit-font-smoothing:antialiased;background-image:radial-gradient(circle at 15% -10%,rgba(139,124,255,.10),transparent 45%),radial-gradient(circle at 85% 5%,rgba(34,211,238,.07),transparent 45%)}
    ::selection{background:rgba(139,124,255,.3)}
    ::-webkit-scrollbar{width:10px;height:10px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:#2a2e38;border-radius:6px;border:2px solid var(--bg)}
    ::-webkit-scrollbar-thumb:hover{background:#3a3f4b}
    .topbar{position:sticky;top:0;z-index:20;background:rgba(13,15,19,.8);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between}
    .topbar-left{display:flex;align-items:center;gap:12px}
    .topbar .logo-badge{display:flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,#8b7cff,#22d3ee);box-shadow:0 2px 16px rgba(139,124,255,.45)}
    .topbar h1{font-size:16px;font-weight:700;letter-spacing:-.01em;background:linear-gradient(90deg,#fff,#aab2c8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .topbar a{font-size:13px;font-weight:500;color:var(--muted);text-decoration:none;padding:7px 14px;border:1px solid var(--border2);border-radius:8px;transition:all .2s}
    .topbar a:hover{color:var(--gold);border-color:var(--gold);background:rgba(139,124,255,.08)}
    .container{max-width:920px;margin:0 auto;padding:28px 18px 60px;display:grid;gap:18px}
    .card{background:linear-gradient(180deg,var(--card),var(--card2));border:1px solid var(--border);border-radius:16px;padding:22px;box-shadow:0 1px 0 rgba(255,255,255,.02) inset,0 8px 24px rgba(0,0,0,.25);animation:rise .4s ease backwards}
    .card:nth-child(2){animation-delay:.04s}.card:nth-child(3){animation-delay:.08s}.card:nth-child(4){animation-delay:.12s}.card:nth-child(5){animation-delay:.16s}
    @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
    .card h2{display:flex;align-items:center;gap:9px;font-size:12.5px;font-weight:700;color:var(--gold);margin-bottom:18px;text-transform:uppercase;letter-spacing:.08em}
    .card h2::before{content:'';width:3px;height:14px;border-radius:2px;background:linear-gradient(180deg,#8b7cff,#22d3ee)}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .form-grid.three{grid-template-columns:1fr 1fr 1fr}
    .field{display:flex;flex-direction:column;gap:7px}
    .field label{font-size:11.5px;color:var(--muted);font-weight:600;letter-spacing:.02em}
    .field input{background:#0a0c10;border:1px solid var(--border2);border-radius:9px;padding:11px 13px;color:var(--txt);font-size:13.5px;outline:none;transition:all .18s}
    .field input::placeholder{color:#444a55}
    .field input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(139,124,255,.18);background:#0d111b}
    .btn{padding:10px 18px;border-radius:9px;border:1px solid transparent;font-size:13px;font-weight:600;cursor:pointer;transition:all .18s;letter-spacing:.01em}
    .btn:active{transform:translateY(1px)}
    .btn-yellow{background:linear-gradient(135deg,#8b7cff,#22d3ee);color:#0a0c14;box-shadow:0 4px 16px rgba(139,124,255,.3)}
    .btn-yellow:hover{box-shadow:0 6px 22px rgba(139,124,255,.5);filter:brightness(1.08)}
    .btn-outline{background:#161c28;color:#b4bac4;border-color:var(--border2)}
    .btn-outline:hover{color:var(--gold);border-color:var(--gold);background:rgba(139,124,255,.08)}
    .btn-green{background:linear-gradient(135deg,#16a34a,#15803d);color:#fff;box-shadow:0 4px 14px rgba(22,163,74,.25)}
    .btn-green:hover{box-shadow:0 6px 20px rgba(22,163,74,.4);filter:brightness(1.08)}
    .btn-row{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap;align-items:center}
    .status-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;font-size:11.5px;font-weight:700;letter-spacing:.03em}
    .status-badge::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor;box-shadow:0 0 8px currentColor}
    .badge-pending{background:rgba(234,179,8,.12);color:#eab308;border:1px solid rgba(234,179,8,.3)}
    .badge-paid{background:rgba(34,197,94,.12);color:#22c55e;border:1px solid rgba(34,197,94,.3)}
    .badge-expired{background:rgba(239,68,68,.12);color:#ef4444;border:1px solid rgba(239,68,68,.3)}
    .invoice-card{background:#0a0c10;border:1px solid var(--border);border-radius:12px;padding:16px 18px;margin-top:14px}
    .inv-row{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px}
    .inv-row:last-child{border-bottom:none}
    .inv-row:first-child{padding-top:2px}
    .inv-label{color:var(--muted);font-size:12px;font-weight:500}
    .inv-value{color:var(--txt);font-family:'SF Mono','JetBrains Mono',ui-monospace,monospace;font-size:12.5px;word-break:break-all;text-align:right;max-width:65%}
    .inv-value.highlight{color:var(--gold);font-weight:700;font-size:17px;text-shadow:0 0 18px rgba(139,124,255,.45)}
    .pay-option{background:linear-gradient(180deg,#11151f,#0d111b);border:1px solid var(--border2);border-radius:12px;padding:15px;margin-top:10px;transition:border .2s}
    .pay-option:hover{border-color:#363b46}
    .pay-option .method-label{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--gold);margin-bottom:10px}
    .copyable{cursor:pointer;transition:color .18s;border-radius:4px}
    .copyable:hover{color:var(--gold)}
    .copy-hint{font-size:10.5px;color:var(--muted2);margin-top:6px}
    .alert{padding:12px 15px;border-radius:10px;font-size:13px;margin-top:14px;line-height:1.45;animation:rise .3s ease}
    .alert-error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#f87171}
    .alert-success{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:#4ade80}
    .alert-info{background:rgba(139,124,255,.1);border:1px solid rgba(139,124,255,.3);color:var(--gold)}
    .spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(139,124,255,.25);border-top-color:var(--gold);border-radius:50%;animation:spin .65s linear infinite;vertical-align:-2px;margin-right:7px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .list-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
    .list-header h2{margin-bottom:0}
    .inv-list-item{display:flex;justify-content:space-between;align-items:center;padding:13px 16px;background:#0a0c10;border:1px solid var(--border);border-radius:11px;margin-bottom:9px;cursor:pointer;transition:all .18s}
    .inv-list-item:hover{border-color:var(--gold);background:#11151f;transform:translateX(2px)}
    .inv-list-left{display:flex;flex-direction:column;gap:4px}
    .inv-list-id{font-family:ui-monospace,monospace;font-size:11px;color:var(--muted2)}
    .inv-list-amount{font-size:14.5px;font-weight:700;color:var(--txt)}
    .empty-state{text-align:center;padding:36px;color:var(--muted2);font-size:13px}
    .saved-msg{font-size:12px;color:#4ade80;font-weight:600;display:none}
    .method-label{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.1em}
    @media(max-width:600px){.form-grid,.form-grid.three{grid-template-columns:1fr}.container{padding:18px 12px 40px}.card{padding:18px}.topbar{padding:12px 16px}}
  </style>
</head>
<body>
<div class="topbar">
  <div class="topbar-left">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
      <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="#0a0c14" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <h1>Binance Pay Gateway</h1>
  </div>
  <a href="/docs">API Docs</a>
</div>

<div class="container">

  <div class="card">
    <h2>Credentials</h2>
    <div class="form-grid three">
      <div class="field"><label>API Key</label><input type="password" id="apiKey" placeholder="Binance API Key" /></div>
      <div class="field"><label>API Secret</label><input type="password" id="apiSecret" placeholder="Binance API Secret" /></div>
      <div class="field"><label>Pay ID</label><input type="text" id="payId" placeholder="123456789" /></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-yellow" onclick="saveCreds()">Simpan</button>
      <button class="btn btn-outline" onclick="clearCreds()">Hapus</button>
      <span class="saved-msg" id="savedMsg">Tersimpan di localStorage</span>
    </div>
  </div>

  <div class="card">
    <h2>Buat Invoice</h2>
    <div class="form-grid">
      <div class="field"><label>Amount</label><input type="number" id="amount" placeholder="5.00" step="0.01" min="0.01" /></div>
      <div class="field"><label>Currency</label><input type="text" id="currency" value="USDT" /></div>
      <div class="field"><label>Network (opsional)</label><input type="text" id="network" placeholder="TRC20 / BEP20 / PAY" /></div>
      <div class="field"><label>Product ID (opsional)</label><input type="text" id="productId" placeholder="PROD-001" /></div>
      <div class="field"><label>Buyer (opsional)</label><input type="text" id="buyer" placeholder="username" /></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-yellow" onclick="createInvoice()">Buat Invoice</button>
    </div>
    <div id="createResult"></div>
  </div>

  <div class="card">
    <h2>Cek / Klaim Invoice</h2>
    <div class="form-grid">
      <div class="field"><label>Invoice ID</label><input type="text" id="checkId" placeholder="INV..." /></div>
      <div class="field"><label>Transaction ID (untuk klaim Pay)</label><input type="text" id="claimTxId" placeholder="320..." /></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-yellow" onclick="checkInvoice()">Cek Status</button>
      <button class="btn btn-green" onclick="claimInvoice()">Klaim via TxId</button>
    </div>
    <div id="checkResult"></div>
  </div>

  <div class="card">
    <div class="list-header">
      <h2>Semua Invoice</h2>
      <button class="btn btn-outline" onclick="loadList()">Refresh</button>
    </div>
    <div id="invoiceList"><div class="empty-state">Klik Refresh untuk memuat</div></div>
  </div>

  <div class="card">
    <h2>Debug — Cek Koneksi Binance</h2>
    <div class="form-grid">
      <div class="field"><label>Berapa jam ke belakang (max 168)</label><input type="number" id="debugHours" value="24" min="1" max="168" /></div>
      <div class="field"><label>Filter Coin (opsional, untuk deposit)</label><input type="text" id="debugCoin" placeholder="USDT" /></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-yellow" onclick="debugPay()">Cek Pay History</button>
      <button class="btn btn-green" onclick="debugPayFull()">Pay History Full (90 hari)</button>
      <button class="btn btn-outline" onclick="debugDeposit()">Cek Deposit History</button>
      <button class="btn btn-outline" onclick="debugWithdraw()">Cek Withdraw History</button>
      <button class="btn btn-outline" onclick="debugBalances()">Cek Saldo</button>
      <button class="btn btn-green" onclick="debugOverview()">Lihat Semua (Overview)</button>
    </div>
    <div id="debugResult"></div>
  </div>

</div>
<script>
const API='/api';
function getCreds(){return{apiKey:localStorage.getItem('bnApiKey')||'',apiSecret:localStorage.getItem('bnApiSecret')||'',payId:localStorage.getItem('bnPayId')||''};}
function saveCreds(){const k=document.getElementById('apiKey').value.trim(),s=document.getElementById('apiSecret').value.trim(),p=document.getElementById('payId').value.trim();if(k)localStorage.setItem('bnApiKey',k);if(s)localStorage.setItem('bnApiSecret',s);if(p)localStorage.setItem('bnPayId',p);const m=document.getElementById('savedMsg');m.style.display='inline';setTimeout(()=>m.style.display='none',2000);}
function clearCreds(){['bnApiKey','bnApiSecret','bnPayId'].forEach(k=>localStorage.removeItem(k));['apiKey','apiSecret','payId'].forEach(id=>document.getElementById(id).value='');}
function headers(){const c=getCreds(),h={'Content-Type':'application/json'};if(c.apiKey)h['X-Binance-Api-Key']=c.apiKey;if(c.apiSecret)h['X-Binance-Api-Secret']=c.apiSecret;if(c.payId)h['X-Binance-Pay-Id']=c.payId;return h;}
async function req(path,opts={}){const r=await fetch(API+path,{headers:headers(),...opts});const d=await r.json().catch(()=>({error:'bukan JSON'}));return{ok:r.ok,data:d};}
function badge(s){const m={PAID:'badge-paid',EXPIRED:'badge-expired',PENDING:'badge-pending'};return '<span class="status-badge '+(m[s]||'badge-pending')+'">'+s+'</span>';}
function copy(t){navigator.clipboard.writeText(t).catch(()=>{});}
function renderInvoice(inv){
  if(!inv)return'';
  const opts=(inv.paymentOptions||[]).map(o=>{
    let rows='';
    if(o.method==='BINANCE_PAY'){rows='<div class="inv-row"><span class="inv-label">Pay ID</span><span class="inv-value copyable" onclick="copy(\''+o.payId+'\')">'+o.payId+'</span></div>';}
    else{rows='<div class="inv-row"><span class="inv-label">Network</span><span class="inv-value">'+o.network+'</span></div><div class="inv-row"><span class="inv-label">Address</span><span class="inv-value copyable" onclick="copy(\''+o.depositAddress+'\')">'+o.depositAddress+'</span></div>';}
    return'<div class="pay-option"><div class="method-label">'+o.method.replace('_',' ')+'</div>'+rows+'<p class="copy-hint">klik nilai untuk salin</p></div>';
  }).join('');
  const txRow=inv.transactionId?'<div class="inv-row"><span class="inv-label">Tx ID</span><span class="inv-value copyable" onclick="copy(\''+inv.transactionId+'\')">'+inv.transactionId+'</span></div>':'';
  const hashRow=inv.txHash?'<div class="inv-row"><span class="inv-label">Tx Hash</span><span class="inv-value copyable" onclick="copy(\''+inv.txHash+'\')">'+inv.txHash+'</span></div>':'';
  return'<div class="invoice-card">'+
    '<div class="inv-row"><span class="inv-label">Invoice ID</span><span class="inv-value copyable" onclick="copy(\''+inv.id+'\');document.getElementById(\'checkId\').value=\''+inv.id+'\'">'+inv.id+'</span></div>'+
    '<div class="inv-row"><span class="inv-label">Status</span>'+badge(inv.status)+'</div>'+
    '<div class="inv-row"><span class="inv-label">Bayar Tepat</span><span class="inv-value highlight">'+inv.expectedAmount+' '+inv.currency+'</span></div>'+
    '<div class="inv-row"><span class="inv-label">Berlaku sampai</span><span class="inv-value">'+new Date(inv.expiresAt).toLocaleString('id-ID')+'</span></div>'+
    txRow+hashRow+opts+'</div>';
}
async function createInvoice(){
  const el=document.getElementById('createResult');
  el.innerHTML='<div class="alert alert-info"><span class="spinner"></span>Membuat invoice...</div>';
  const b={amount:parseFloat(document.getElementById('amount').value),currency:document.getElementById('currency').value.trim()||'USDT'};
  const net=document.getElementById('network').value.trim(),prod=document.getElementById('productId').value.trim(),buyer=document.getElementById('buyer').value.trim();
  if(net)b.network=net;if(prod)b.productId=prod;if(buyer)b.buyer=buyer;
  const {ok,data}=await req('/invoices',{method:'POST',body:JSON.stringify(b)});
  if(!ok){el.innerHTML='<div class="alert alert-error">'+(data.error||'Error')+'</div>';return;}
  document.getElementById('checkId').value=data.invoiceId;
  el.innerHTML='<div class="alert alert-success">Invoice berhasil dibuat!</div>'+renderInvoice({id:data.invoiceId,status:data.status,currency:data.currency,expectedAmount:data.amountToPay,expiresAt:data.expiresAt,paymentOptions:data.paymentOptions});
  loadList();
}
let poller=null;
async function checkInvoice(){
  const id=document.getElementById('checkId').value.trim();if(!id)return;
  const el=document.getElementById('checkResult');
  el.innerHTML='<div class="alert alert-info"><span class="spinner"></span>Mengecek ke Binance...</div>';
  const {ok,data}=await req('/invoices/'+id+'/check',{method:'POST'});
  if(!ok){el.innerHTML='<div class="alert alert-error">'+(data.error||'Error')+'</div>';return;}
  const inv=data.invoice||data;el.innerHTML=renderInvoice(inv);
  if(data.status==='PENDING'){
    if(poller)clearInterval(poller);
    el.innerHTML+='<div class="alert alert-info" id="pollMsg"><span class="spinner"></span>Auto-cek tiap 15 detik...</div>';
    poller=setInterval(async()=>{
      const r=await req('/invoices/'+id+'/check',{method:'POST'});if(!r.ok)return;
      const i=r.data.invoice||r.data;el.innerHTML=renderInvoice(i);
      if(r.data.status!=='PENDING'){clearInterval(poller);loadList();}
    },15000);
  }
}
async function claimInvoice(){
  const id=document.getElementById('checkId').value.trim(),txId=document.getElementById('claimTxId').value.trim();
  if(!id||!txId){alert('Isi Invoice ID dan Transaction ID');return;}
  const el=document.getElementById('checkResult');
  el.innerHTML='<div class="alert alert-info"><span class="spinner"></span>Memverifikasi...</div>';
  const {ok,data}=await req('/invoices/'+id+'/claim',{method:'POST',body:JSON.stringify({transactionId:txId})});
  if(!ok){el.innerHTML='<div class="alert alert-error">'+(data.error||'Error')+'</div>';return;}
  el.innerHTML='<div class="alert alert-success">Pembayaran terverifikasi!</div>'+renderInvoice(data.invoice||data);
  loadList();
}
async function loadList(){
  const el=document.getElementById('invoiceList');
  const {ok,data}=await req('/invoices');
  if(!ok||!Array.isArray(data)||data.length===0){el.innerHTML='<div class="empty-state">Belum ada invoice</div>';return;}
  const sorted=data.sort((a,b)=>b.createdAt-a.createdAt);
  el.innerHTML=sorted.map(inv=>{
    const m={PAID:'badge-paid',EXPIRED:'badge-expired',PENDING:'badge-pending'};
    return'<div class="inv-list-item" onclick="document.getElementById(\'checkId\').value=\''+inv.id+'\';checkInvoice()">'+
      '<div class="inv-list-left"><div class="inv-list-id">'+inv.id+'</div><div class="inv-list-amount">'+inv.expectedAmount+' '+inv.currency+'</div></div>'+
      '<span class="status-badge '+(m[inv.status]||'badge-pending')+'">'+inv.status+'</span></div>';
  }).join('');
}
async function debugPay(){
  const el=document.getElementById('debugResult');
  const hours=document.getElementById('debugHours').value||24;
  el.innerHTML='<div class="alert alert-info"><span class="spinner"></span>Mengambil Pay History dari Binance...</div>';
  const {ok,data}=await req('/debug/pay-history',{method:'POST',body:JSON.stringify({hours:Number(hours)})});
  if(!ok){el.innerHTML='<div class="alert alert-error">'+(data.error||'Error')+' '+(data.code?'(code: '+data.code+')':'')+'</div>';return;}
  const rows=data.transactions.length===0
    ?'<div class="empty-state">Tidak ada transaksi Pay dalam '+data.hoursBack+' jam terakhir</div>'
    :data.transactions.map(t=>'<div class="inv-row"><span class="inv-label">'+new Date(Number(t.transactionTime)).toLocaleString('id-ID')+'</span><span class="inv-value">'+(Number(t.amount)>0?'+':'')+t.amount+' '+t.currency+' &nbsp; <span style="color:#555;font-size:11px">'+t.transactionId+'</span></span></div>').join('');
  el.innerHTML='<div class="alert alert-success">Koneksi OK — '+data.count+' transaksi Pay dalam '+data.hoursBack+' jam terakhir</div><div class="invoice-card">'+rows+'</div>';
}
async function debugPayFull(){
  const el=document.getElementById('debugResult');
  el.innerHTML='<div class="alert alert-info"><span class="spinner"></span>Mengambil SEMUA Pay History (bisa 10-30 detik)...</div>';
  const {ok,data}=await req('/debug/pay-history',{method:'POST',body:JSON.stringify({full:true,days:90})});
  if(!ok){el.innerHTML='<div class="alert alert-error">'+(data.error||'Error')+' '+(data.code?'(code: '+data.code+')':'')+'</div>';return;}
  const rows=data.transactions.length===0
    ?'<div class="empty-state">Tidak ada transaksi Pay dalam '+data.daysBack+' hari terakhir</div>'
    :data.transactions.map(t=>'<div class="inv-row"><span class="inv-label">'+new Date(Number(t.transactionTime)).toLocaleString('id-ID')+'</span><span class="inv-value">'+(Number(t.amount)>0?'+':'')+t.amount+' '+t.currency+' &nbsp; <span style="color:#555;font-size:11px">'+t.transactionId+'</span></span></div>').join('');
  const warn=data.truncated?' <span style="color:#eab308">(terpotong, ada lebih banyak)</span>':'';
  el.innerHTML='<div class="alert alert-success">'+data.count+' transaksi Pay dalam '+data.daysBack+' hari ('+data.apiCalls+' API call)'+warn+'</div><div class="invoice-card">'+rows+'</div>';
}
async function debugOverview(){
  const el=document.getElementById('debugResult');
  el.innerHTML='<div class="alert alert-info"><span class="spinner"></span>Mengambil semua isi akun (10-20 detik)...</div>';
  const {ok,data}=await req('/debug/overview',{method:'POST',body:JSON.stringify({days:30})});
  if(!ok){el.innerHTML='<div class="alert alert-error">'+(data.error||'Error')+'</div>';return;}
  const ic={PAY:'#8b7cff',DEPOSIT:'#22c55e',WITHDRAW:'#ef4444',CONVERT:'#22d3ee',DIVIDEN:'#c084fc'};
  const balHtml=data.balances.length===0?'<div class="empty-state">Tidak ada saldo</div>':data.balances.map(b=>'<div class="inv-row"><span class="inv-label">'+b.asset+'</span><span class="inv-value">'+b.free+(parseFloat(b.locked)>0?' (locked: '+b.locked+')':'')+'</span></div>').join('');
  const tlHtml=data.timeline.length===0?'<div class="empty-state">Tidak ada aktivitas dalam '+data.daysBack+' hari</div>':data.timeline.map(t=>'<div class="inv-row"><span class="inv-label"><span style="color:'+(ic[t.type]||'#888')+';font-weight:600">'+t.type+'</span> &nbsp; '+new Date(t.time).toLocaleString('id-ID')+(t.network?' &nbsp; '+t.network:'')+'</span><span class="inv-value">'+t.amount+' '+t.asset+'</span></div>').join('');
  const failed=Object.entries(data.sources).filter(([k,v])=>!v).map(([k])=>k);
  const warn=failed.length?'<div class="alert alert-error">Gagal ambil: '+failed.join(', ')+'</div>':'';
  el.innerHTML='<div class="alert alert-success">Akun '+(data.accountType||'')+' — '+data.balances.length+' aset, '+data.timeline.length+' aktivitas ('+data.daysBack+' hari)</div>'+warn+
    '<div class="method-label" style="margin:12px 0 4px;color:#8b7cff">SALDO</div><div class="invoice-card">'+balHtml+'</div>'+
    '<div class="method-label" style="margin:12px 0 4px;color:#8b7cff">TIMELINE AKTIVITAS</div><div class="invoice-card">'+tlHtml+'</div>';
}
async function debugDeposit(){
  const el=document.getElementById('debugResult');
  const hours=document.getElementById('debugHours').value||24;
  const coin=document.getElementById('debugCoin').value.trim();
  el.innerHTML='<div class="alert alert-info"><span class="spinner"></span>Mengambil Deposit History dari Binance...</div>';
  const {ok,data}=await req('/debug/deposit-history',{method:'POST',body:JSON.stringify({hours:Number(hours),coin:coin||undefined})});
  if(!ok){el.innerHTML='<div class="alert alert-error">'+(data.error||'Error')+' '+(data.code?'(code: '+data.code+')':'')+'</div>';return;}
  const rows=data.deposits.length===0
    ?'<div class="empty-state">Tidak ada deposit dalam '+data.hoursBack+' jam terakhir'+(coin?' ('+coin+')':'')+'</div>'
    :data.deposits.map(d=>'<div class="inv-row"><span class="inv-label">'+new Date(Number(d.insertTime)).toLocaleString('id-ID')+' &nbsp; '+d.network+'</span><span class="inv-value">+'+d.amount+' '+d.coin+' &nbsp; <span style="color:#555;font-size:11px">'+d.id+'</span></span></div>').join('');
   el.innerHTML='<div class="alert alert-success">Koneksi OK — '+data.count+' deposit dalam '+data.hoursBack+' jam terakhir</div><div class="invoice-card">'+rows+'</div>';
}
